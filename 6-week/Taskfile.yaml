version: "3"
method: none

vars:
  ENV_FILE: '{{default ".env" .ENV_FILE}}'

  # - - -
  # Protobuf and generation
  # - - -
  PROTO_DIR: proto
  GEN_GRPC_DIR: gen/grpc
  GEN_OPENAPI_DIR: gen/openapi
  SWAGGER_UI_DIR: third_party/swagger-ui
  GEN_SWAGGER_UI_STATIK_DIR: internal/adapters/in/transport/http
  GEN_SWAGGER_UI_STATIK_PACKAGE: swagger
  GRPC_GATEWAY_VERSION: v2.27.7

  # - - -
  # Database
  # - - -
  MIGRATION_DIR: migrations
  MIGRATION_DSN: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"

  # - - -
  # Build artifacts
  # - - -
  BUILD_DIR: build
  BUILD_TESTS_DIR: "{{.BUILD_DIR}}/tests"

  # - - -
  # TLS (development)
  # - - -
  TLS_DIR: "{{.BUILD_DIR}}/tls"
  TLS_CERT_FILE: "{{.TLS_DIR}}/server.crt"
  TLS_KEY_FILE: "{{.TLS_DIR}}/server.key"

  # - - -
  # JWT (development)
  # - - -
  JWT_DIR: "{{.BUILD_DIR}}/jwt"
  JWT_PRIVATE_KEY_FILE: "{{.JWT_DIR}}/rs256_private.pem"
  JWT_PUBLIC_KEY_FILE: "{{.JWT_DIR}}/rs256_public.pem"

tasks:
  # - - -
  # Environment checks
  # - - -
  check-os:
    silent: true
    cmds:
      - |
        {{if eq OS "windows"}}
          echo "🪟 Windows detected? 🐧 sudo switch-to-linux --now!"
        {{end}}

  # - - -
  # Tooling and code generation
  # - - -
  install-deps:
    desc: 🛠️ Install protobuf toolchain, statik, minimock, and gotestsum
    deps: [check-os]
    status:
      - command -v protoc >/dev/null 2>&1
      - test -x "$(go env GOPATH)/bin/protoc-gen-go"
      - test -x "$(go env GOPATH)/bin/protoc-gen-go-grpc"
      - test -x "$(go env GOPATH)/bin/protoc-gen-grpc-gateway"
      - test -x "$(go env GOPATH)/bin/protoc-gen-openapiv2"
      - test -x "$(go env GOPATH)/bin/protoc-gen-validate"
      - test -x "$(go env GOPATH)/bin/statik"
      - test -x "$(go env GOPATH)/bin/minimock"
      - test -x "$(go env GOPATH)/bin/gotestsum"
    silent: true
    cmds:
      - echo "📦 Checking dependencies..."
      - |
        if ! command -v protoc >/dev/null 2>&1;
        then
          echo "❌ Error: protoc not found."
          echo "👉 Install it with one of:"
          echo "   Arch:          sudo pacman -S protobuf"
          echo "   Ubuntu/Debian: sudo apt-get update && sudo apt-get install -y protobuf-compiler"
          echo "   macOS (brew):  brew install protobuf"
          exit 1
        fi
      - echo "✅ protoc found"
      - echo "⬇️  Installing Go plugins and testing tools..."
      - |
        go install \
            github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@{{.GRPC_GATEWAY_VERSION}} \
            github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@{{.GRPC_GATEWAY_VERSION}}
      - |
        go install \
            google.golang.org/protobuf/cmd/protoc-gen-go \
            google.golang.org/grpc/cmd/protoc-gen-go-grpc
      - go install github.com/envoyproxy/protoc-gen-validate@latest
      - go install github.com/rakyll/statik@latest
      - go install github.com/gojuno/minimock/v3/cmd/minimock@latest
      - go install gotest.tools/gotestsum@latest
      - echo "🎉 All dependencies installed!"

  generate:
    desc: 🚀 Generate Go protobuf/grpc/gateway stubs and Swagger for all .proto files
    deps: [install-deps, jwt:generate]
    sources:
      - proto/**/*.proto
      - third_party/proto/**/*.proto
      - third_party/swagger-ui/**
    generates:
      - gen/grpc/**/*.go
      - gen/openapi/**/*.swagger.json
      - internal/adapters/in/transport/http/swagger/statik.go
    silent: true
    cmds:
      - echo "🔨 Generating Go code from protos..."
      - mkdir -p "{{.GEN_GRPC_DIR}}"
      - mkdir -p "{{.GEN_OPENAPI_DIR}}"
      - |
        export PATH="$(go env GOPATH)/bin:$PATH"
        PROTO_FILES="$(find "{{.PROTO_DIR}}" -type f -name '*.proto' -print)"

        if [ -z "$PROTO_FILES" ]; then
          echo "⚠️  No .proto files found under '{{.PROTO_DIR}}'"
          exit 1
        fi

        protoc \
          -I "{{.PROTO_DIR}}" \
          -I "third_party/proto" \
          --go_out="{{.GEN_GRPC_DIR}}" --go_opt=paths=source_relative \
          --go-grpc_out="{{.GEN_GRPC_DIR}}" --go-grpc_opt=paths=source_relative \
          --grpc-gateway_out="{{.GEN_GRPC_DIR}}" --grpc-gateway_opt=paths=source_relative \
          --openapiv2_out="{{.GEN_OPENAPI_DIR}}" --openapiv2_opt=logtostderr=true \
          --validate_out="lang=go,paths=source_relative:{{.GEN_GRPC_DIR}}" \
          $PROTO_FILES
      - echo "📦 Packing Swagger UI static files into Go source..."
      - |
        export PATH="$(go env GOPATH)/bin:$PATH"
        statik \
          -src="{{.SWAGGER_UI_DIR}}" \
          -dest="{{.GEN_SWAGGER_UI_STATIK_DIR}}" \
          -p "{{.GEN_SWAGGER_UI_STATIK_PACKAGE}}" \
          -f
      - echo "✨ Generation complete!"

  # - - -
  # Service run tasks
  # - - -
  run-user:
    desc: 👤 Run User Service
    cmds:
      - go run ./cmd/main.go -config-path "{{.ENV_FILE}}"

  dev:
    desc: 🏃 Run both services in parallel
    deps: [run-user]

  # - - -
  # TLS (development)
  # - - -

  tls:generate:
    desc: 🔐 Generate dev TLS cert and key from ENV_FILE
    silent: true
    cmds:
      - |
        TLS_CERT_PATH="{{.TLS_CERT_FILE}}"
        TLS_KEY_PATH="{{.TLS_KEY_FILE}}"

        if [ -f "{{.ENV_FILE}}" ]; then
          set -a
          . "{{.ENV_FILE}}"
          set +a
        fi

        if [ -n "${TLS_CERT_FILE}" ]; then
          TLS_CERT_PATH="${TLS_CERT_FILE}"
        fi

        if [ -n "${TLS_KEY_FILE}" ]; then
          TLS_KEY_PATH="${TLS_KEY_FILE}"
        fi

        if [ -f "${TLS_CERT_PATH}" ] && [ -f "${TLS_KEY_PATH}" ]; then
          echo "🔐 TLS cert and key already exist, skip generation"
          exit 0
        fi

        : "${TLS_CERT_CN:?TLS_CERT_CN is not set}"
        : "${TLS_CERT_SAN_DNS:?TLS_CERT_SAN_DNS is not set}"
        : "${TLS_CERT_SAN_IP:?TLS_CERT_SAN_IP is not set}"

        mkdir -p "$(dirname "${TLS_CERT_PATH}")"
        mkdir -p "$(dirname "${TLS_KEY_PATH}")"

        TLS_SAN="DNS:${TLS_CERT_SAN_DNS},IP:${TLS_CERT_SAN_IP}"
        echo "🔐 Generating TLS cert and key..."
        openssl req -x509 -newkey rsa:2048 -sha256 -nodes -days 365 \
          -keyout "${TLS_KEY_PATH}" \
          -out "${TLS_CERT_PATH}" \
          -subj "/CN=${TLS_CERT_CN}" \
          -addext "subjectAltName=${TLS_SAN}" >/dev/null 2>&1

        chmod 644 "${TLS_CERT_PATH}"
        chmod 600 "${TLS_KEY_PATH}"
        echo "✅ TLS cert and key generated"

  tls:verify:
    desc: ✅ Verify dev TLS cert and key
    silent: true
    cmds:
      - test -f "{{.TLS_CERT_FILE}}"
      - test -f "{{.TLS_KEY_FILE}}"
      - openssl x509 -in "{{.TLS_CERT_FILE}}" -noout -subject -issuer -dates -ext subjectAltName
      - openssl x509 -noout -modulus -in "{{.TLS_CERT_FILE}}" | openssl md5
      - openssl rsa -noout -modulus -in "{{.TLS_KEY_FILE}}" | openssl md5

  # - - -
  # JWT (development)
  # - - -

  jwt:generate:
    desc: 🔑 Generate RS256 JWT private/public keys
    silent: true
    cmds:
      - |
        JWT_PRIVATE_KEY_PATH="{{.JWT_PRIVATE_KEY_FILE}}"
        JWT_PUBLIC_KEY_PATH="{{.JWT_PUBLIC_KEY_FILE}}"

        if [ -f "{{.ENV_FILE}}" ]; then
          set -a
          . "{{.ENV_FILE}}"
          set +a
        fi

        if [ -n "${JWT_PRIVATE_KEY_FILE}" ]; then
          JWT_PRIVATE_KEY_PATH="${JWT_PRIVATE_KEY_FILE}"
        fi

        if [ -n "${JWT_PUBLIC_KEY_FILE}" ]; then
          JWT_PUBLIC_KEY_PATH="${JWT_PUBLIC_KEY_FILE}"
        fi

        if [ -f "${JWT_PRIVATE_KEY_PATH}" ] && [ -f "${JWT_PUBLIC_KEY_PATH}" ]; then
          echo "🔑 JWT keys already exist, skip generation"
          exit 0
        fi

        mkdir -p "$(dirname "${JWT_PRIVATE_KEY_PATH}")"
        mkdir -p "$(dirname "${JWT_PUBLIC_KEY_PATH}")"

        echo "🔑 Generating RS256 JWT keys..."
        openssl genpkey -quiet -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "${JWT_PRIVATE_KEY_PATH}" >/dev/null 2>&1
        openssl rsa -pubout -in "${JWT_PRIVATE_KEY_PATH}" -out "${JWT_PUBLIC_KEY_PATH}" >/dev/null 2>&1
        echo "✅ JWT keys generated"
      - |
        JWT_PRIVATE_KEY_PATH="{{.JWT_PRIVATE_KEY_FILE}}"
        JWT_PUBLIC_KEY_PATH="{{.JWT_PUBLIC_KEY_FILE}}"

        if [ -f "{{.ENV_FILE}}" ]; then
          set -a
          . "{{.ENV_FILE}}"
          set +a
        fi

        if [ -n "${JWT_PRIVATE_KEY_FILE}" ]; then
          JWT_PRIVATE_KEY_PATH="${JWT_PRIVATE_KEY_FILE}"
        fi

        if [ -n "${JWT_PUBLIC_KEY_FILE}" ]; then
          JWT_PUBLIC_KEY_PATH="${JWT_PUBLIC_KEY_FILE}"
        fi

        chmod 600 "${JWT_PRIVATE_KEY_PATH}"
        chmod 644 "${JWT_PUBLIC_KEY_PATH}"

  jwt:verify:
    desc: ✅ Verify RS256 JWT key pair
    silent: true
    cmds:
      - |
        JWT_PRIVATE_KEY_PATH="{{.JWT_PRIVATE_KEY_FILE}}"
        JWT_PUBLIC_KEY_PATH="{{.JWT_PUBLIC_KEY_FILE}}"

        if [ -f "{{.ENV_FILE}}" ]; then
          set -a
          . "{{.ENV_FILE}}"
          set +a
        fi

        if [ -n "${JWT_PRIVATE_KEY_FILE}" ]; then
          JWT_PRIVATE_KEY_PATH="${JWT_PRIVATE_KEY_FILE}"
        fi

        if [ -n "${JWT_PUBLIC_KEY_FILE}" ]; then
          JWT_PUBLIC_KEY_PATH="${JWT_PUBLIC_KEY_FILE}"
        fi

        test -f "${JWT_PRIVATE_KEY_PATH}"
        test -f "${JWT_PUBLIC_KEY_PATH}"
        openssl pkey -in "${JWT_PRIVATE_KEY_PATH}" -check -noout
        openssl rsa -pubin -in "${JWT_PUBLIC_KEY_PATH}" -text -noout

  # - - -
  # Testing
  # - - -
  test:
    desc: 🧪 Run user service tests with gotestsum
    deps: [install-deps]
    silent: true
    cmds:
      - |
        export PATH="$(go env GOPATH)/bin:$PATH"
        gotestsum -- ./internal/...

  test-coverage-html:
    desc: 📈 Run user tests with HTML coverage report via gotestsum
    deps: [install-deps]
    silent: true
    cmds:
      - mkdir -p "{{.BUILD_TESTS_DIR}}"
      - |
        export PATH="$(go env GOPATH)/bin:$PATH"
        gotestsum -- -coverprofile="{{.BUILD_TESTS_DIR}}/coverage.out" ./internal/...
      - go tool cover -html="{{.BUILD_TESTS_DIR}}/coverage.out" -o "{{.BUILD_TESTS_DIR}}/coverage.html"

  # - - -
  # Cleanup
  # - - -
  clean:gen:
    desc: 🧹 Remove generated source code artifacts
    silent: true
    cmds:
      - rm -rf "{{.GEN_GRPC_DIR}}" "{{.GEN_OPENAPI_DIR}}" "{{.GEN_SWAGGER_UI_STATIK_DIR}}/{{.GEN_SWAGGER_UI_STATIK_PACKAGE}}/statik.go"

  clean:build:
    desc: 🧽 Remove build/runtime artifacts
    silent: true
    cmds:
      - rm -rf "{{.BUILD_DIR}}"

  clean:
    desc: ♻️ Remove generated and build artifacts
    deps: [clean:gen, clean:build]

  # - - -
  # Database migrations
  # - - -
  migration-status:
    desc: 📊 Check migration status
    silent: true
    cmds:
      - goose -dir {{.MIGRATION_DIR}} postgres "{{.MIGRATION_DSN}}" status -v

  migration-new:
    desc: 🆕 Create new SQL migration (sequential)
    silent: true
    requires:
      vars: [NAME]
    cmds:
      - goose -dir {{.MIGRATION_DIR}} -s create "{{.NAME}}" sql

  migration-up:
    desc: 🆙 Apply migrations
    silent: true
    cmds:
      - goose -dir {{.MIGRATION_DIR}} postgres "{{.MIGRATION_DSN}}" up -v

  migration-down:
    desc: ⬇️ Rollback migrations
    silent: true
    cmds:
      - goose -dir {{.MIGRATION_DIR}} postgres "{{.MIGRATION_DSN}}" down -v
