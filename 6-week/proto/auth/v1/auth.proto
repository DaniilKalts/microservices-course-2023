syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/DaniilKalts/microservices-course-2023/6-week/gen/grpc/auth/v1;authv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "Auth API"
        version: "1.0.0"
        description: "RESTful gateway API for authentication and tokens."
        contact: {
            name: "Daniil Kalts"
            email: "gopher@gmail.com"
        }
    }
    consumes: "application/json"
    produces: "application/json"
};

service AuthV1 {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
        name: "🔐 Auth"
        description: "Handles account registration, authentication, and token lifecycle operations."
    };

    rpc Register(RegisterRequest) returns (RegisterResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/register"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Register a new user account"
            description: "Creates a new user account using name, email, and password credentials. Returns the created user ID and a fresh access/refresh token pair."
            tags: "🔐 Auth"
            operation_id: "registerUser"
        };
    };

    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/login"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Authenticate user and return tokens"
            description: "Authenticates a user with email and password credentials. Returns a new access/refresh token pair for authorized API access."
            tags: "🔐 Auth"
            operation_id: "loginUser"
        };
    };

    rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/api/v1/auth/logout"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Invalidate the current session"
            description: "Invalidates the session associated with the provided refresh token. Requires a valid refresh_token and returns an empty response on success."
            tags: "🔐 Auth"
            operation_id: "logoutUser"
        };
    };

    rpc Refresh(RefreshRequest) returns (RefreshResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/refresh"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Rotate access and refresh tokens"
            description: "Issues a new access/refresh token pair by rotating the provided refresh token. Requires a valid refresh_token and returns replacement tokens."
            tags: "🔐 Auth"
            operation_id: "refreshTokens"
        };
    };
}

message TokenPair {
    string access_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
    string refresh_token = 2 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
}

// Register
message RegisterRequest {
    string name = 1 [(validate.rules).string = {
        min_len: 2,
        max_len: 50,
        pattern: "^[^\\x00-\\x1F\\x7F]+$"
    }];
    string email = 2 [(validate.rules).string = {
        email: true,
        max_len: 254
    }];
    string password = 3 [(validate.rules).string = {
        min_len: 8,
        max_len: 64,
        pattern: "^([A-Za-z].*\\d|\\d.*[A-Za-z]).*$"
    }];
    string password_confirm = 4 [(validate.rules).string = {
        min_len: 8,
        max_len: 64
    }];
}

message RegisterResponse {
    string id = 1 [(validate.rules).string.uuid = true];
    TokenPair tokens = 2 [(validate.rules).message.required = true];
}

// Login
message LoginRequest {
    string email = 1 [(validate.rules).string = {
        email: true,
        max_len: 254
    }];
    string password = 2 [(validate.rules).string = {
        min_len: 8,
        max_len: 64
    }];
}

message LoginResponse {
    TokenPair tokens = 1 [(validate.rules).message.required = true];
}

// Logout
message LogoutRequest {
    string refresh_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
}

// Refresh
message RefreshRequest {
    string refresh_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
}

message RefreshResponse {
    TokenPair tokens = 1 [(validate.rules).message.required = true];
}
