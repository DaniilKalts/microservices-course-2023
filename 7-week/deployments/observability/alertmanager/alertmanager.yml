# ============================================================
# alertmanager.yml — Alertmanager configuration
#
# How it fits:
#   [Prometheus] ──fires alert──> [Alertmanager] ──groups & throttles──> Telegram
#
# Alertmanager handles the "people" side:
#   - Groups related alerts into one message (no spam)
#   - Throttles repeats so you're not pinged every 15 seconds
#   - Sends "resolved" when the problem goes away
#
# NOTE: __TELEGRAM_BOT_TOKEN__ and __TELEGRAM_CHAT_ID__ are
# placeholders replaced at startup by entrypoint.sh using
# environment variables from .env.
# ============================================================

global:
  # After an alert stops firing, wait this long before sending
  # the "resolved" notification — in case it flickers back.
  resolve_timeout: 5m

# ── Routing ─────────────────────────────────────────────────
# Decides which receiver handles each alert.
# This is the root (catch-all) route; child routes can be
# nested under a "routes:" key for more specific matching.
route:
  receiver: telegram

  # Bundle alerts with the same name + service into one message.
  # 10 things break → 1 message listing all 10 (not 10 messages).
  group_by: [alertname, service]

  # Wait 30s for related alerts to arrive before sending the
  # first notification (batches them into one message).
  group_wait: 30s

  # A new alert joins an existing group — wait 5 min before
  # sending an updated notification.
  group_interval: 5m

  # Problem still happening? Remind you every 2 hours.
  repeat_interval: 2h

# ── Receivers ───────────────────────────────────────────────
# Where notifications actually go. Name must match the route above.
receivers:
  - name: telegram
    telegram_configs:
      - bot_token: __TELEGRAM_BOT_TOKEN__    # injected by entrypoint.sh
        chat_id: __TELEGRAM_CHAT_ID__        # injected by entrypoint.sh
        parse_mode: HTML
        send_resolved: true                  # also notify when the problem is gone

        # Go template for the Telegram message.
        # Available context:
        #   .Status              → "firing" or "resolved"
        #   .CommonLabels.*      → labels shared by all alerts in the group
        #   .CommonAnnotations.* → annotations shared by all alerts
        #   .Alerts              → list of individual alerts
        message: |
          {{ if eq .Status "firing" }}🔴 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }} — <b>{{ .CommonLabels.alertname }}</b>
          {{- if .CommonAnnotations.summary }}
          <i>{{ .CommonAnnotations.summary }}</i>
          {{- end }}

          {{- if .CommonLabels.service }}
          <b>Service:</b> <code>{{ .CommonLabels.service }}</code>
          {{- end }}
          {{- if .CommonLabels.severity }}
          <b>Severity:</b> <code>{{ .CommonLabels.severity }}</code>
          {{- end }}
          <b>Alerts:</b> <code>{{ len .Alerts }}</code>

          {{- if .CommonAnnotations.description }}
          <b>Details:</b> {{ .CommonAnnotations.description }}
          {{- end }}

          <a href="{{ (index .Alerts 0).GeneratorURL }}">Open in Prometheus →</a>
