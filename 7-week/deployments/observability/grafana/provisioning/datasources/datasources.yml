# ============================================================
# datasources.yml — Grafana data source provisioning
#
# Auto-registers Prometheus and Loki as data sources on
# Grafana startup. No manual setup needed in the UI.
# ============================================================

apiVersion: 1

# Remove any data source from Grafana that isn't listed here.
# Keeps the UI in sync with this file.
prune: true

datasources:
  # Metrics — powers all dashboard panels except logs
  - name: Prometheus
    uid: prometheus                    # stable ID referenced by dashboard JSON
    type: prometheus
    access: proxy                      # Grafana queries Prometheus server-side
    url: http://prometheus:9090        # docker-compose service name + default port
    isDefault: true                    # pre-selected when creating new panels
    editable: false                    # prevent UI edits — config lives in Git

  # Logs — powers the log panel in the dashboard
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
