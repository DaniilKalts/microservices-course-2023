# ============================================================
# prometheus.yml ‚Äî Prometheus server configuration
#
# How it fits:
#   app:2112/metrics ‚îÄ‚îÄscrape‚îÄ‚îÄ> [Prometheus] ‚îÄ‚îÄalert‚îÄ‚îÄ> [Alertmanager] ‚îÄ‚îÄnotify‚îÄ‚îÄ> Telegram
#                                     |
#                                     ‚îî‚îÄ‚îÄquery‚îÄ‚îÄ> [Grafana dashboards]
#
# Prometheus does two things on a loop:
#   1. Scrapes /metrics from every target (collects numbers)
#   2. Evaluates alert rules against those numbers
# ============================================================

# ‚îÄ‚îÄ Global Defaults ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
global:
  # Pull metrics from every target this often.
  scrape_interval: 15s
  # Give up on a slow /metrics response after this long.
  # Must be < scrape_interval to avoid overlapping scrapes.
  scrape_timeout: 10s
  # Re-check alert rules at this cadence.
  # Matches scrape_interval so each evaluation sees fresh data.
  evaluation_interval: 15s

# ‚îÄ‚îÄ Alert Rules ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Files containing "if X then fire alert Y" definitions.
# Prometheus evaluates them ‚Äî Alertmanager delivers them.
rule_files:
  - "alerts.yml"

# ‚îÄ‚îÄ Where to Send Fired Alerts ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Points Prometheus at the Alertmanager instance.
# Docker DNS resolves "alertmanager" to the right container.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ‚îÄ‚îÄ What to Scrape ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Each job = one service type. The job name becomes a label
# on every metric (job="termachat"), useful for filtering.
scrape_configs:

  # Application metrics (gRPC latency, error counts, etc.)
  - job_name: "termachat"
    static_configs:
      - targets: ["api:2112"]   # docker-compose service "api", metrics port

  # Host-level metrics (CPU, RAM, disk, network) via node-exporter
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
