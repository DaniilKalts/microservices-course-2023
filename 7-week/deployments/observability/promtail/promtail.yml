# ============================================================
# promtail.yml — Promtail log collector configuration
#
# How it fits:
#   [Docker containers] ──stdout/stderr──> [Promtail] ──push──> [Loki]
#
# Promtail watches Docker for running containers, tails their
# log streams, attaches useful labels (service name, stream),
# and pushes everything to Loki.
# ============================================================

# ── Server ──────────────────────────────────────────────────
server:
  http_listen_port: 9080   # health checks and Promtail's own metrics
  grpc_listen_port: 0      # disabled — not needed for log collection

# ── Checkpointing ──────────────────────────────────────────
# Tracks the last-read position per log source so Promtail
# doesn't re-send old logs after a restart.
positions:
  filename: /tmp/positions.yaml

# ── Where to Send Logs ─────────────────────────────────────
clients:
  - url: http://loki:3100/loki/api/v1/push   # Loki's ingestion endpoint

# ── Log Discovery & Processing ─────────────────────────────
scrape_configs:
  - job_name: docker

    # Auto-discover containers via Docker socket.
    # New containers are picked up within refresh_interval.
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    # Processing pipeline — runs on every log line.
    pipeline_stages:
      - docker: {}   # unwrap Docker's JSON log envelope → extract raw message

    # Label mapping — turns Docker metadata into Loki labels
    # so you can query logs like: {job="api", stream="stderr"}
    relabel_configs:
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream    # "stdout" or "stderr"
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job       # docker-compose service name (e.g. "api", "postgres")
