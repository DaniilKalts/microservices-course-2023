# Promtail collects logs from Docker containers and pushes
# them to Loki.

server:
  # health check and metrics port
  http_listen_port: 9080
  # gRPC disabled (not needed)
  grpc_listen_port: 0

# tracks last-read position so logs aren't re-sent after restart
positions:
  filename: /tmp/positions.yaml

# where to send collected logs
clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    # auto-discover containers via Docker socket
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    # extract raw message from Docker's JSON log format
    pipeline_stages:
      - docker: {}

    # map Docker metadata to Loki labels
    relabel_configs:
      # "stdout" or "stderr"
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      # docker-compose service name (e.g. "api", "postgres")
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job
