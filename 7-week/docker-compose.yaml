services:
  postgres:
    image: postgres:17.5
    container_name: microservices-course-2023-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    image: ${MIGRATOR_IMAGE_NAME:-daniilkalts2006/microservices-course-2023-migrator}:${TAG:-latest}
    build:
      context: .
      dockerfile: deployments/migrations/Dockerfile
      target: migrator
    container_name: microservices-course-2023-migrator
    env_file:
      - .env
    volumes:
      - ./deployments/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    image: ${MIGRATOR_IMAGE_NAME:-daniilkalts2006/microservices-course-2023-api}:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microservices-course-2023-api
    user: "1000:1000"
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "2112:2112"
      - "50051:50051"
    volumes:
      - ./build:/app/build:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: microservices-course-2023-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: microservices-course-2023-alertmanager
    env_file:
      - .env
    entrypoint:
      - "/bin/sh"
      - "/etc/alertmanager/entrypoint.sh"
    ports:
      - "9093:9093"
    volumes:
      - ./deployments/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./deployments/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager_data:/alertmanager

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
