services:
  postgres:
    image: postgres:17.5
    container_name: microservices-course-2023-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    image: daniilkalts2006/microservices-course-2023-migrator:latest
    build:
      context: .
      dockerfile: deployments/migrations/Dockerfile
      target: migrator
    container_name: microservices-course-2023-migrator
    env_file:
      - .env
    volumes:
      - ./deployments/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    image: daniilkalts2006/microservices-course-2023-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microservices-course-2023-api
    user: "1000:1000"
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "2112:2112"
      - "50051:50051"
    volumes:
      - ./build:/app/build:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: microservices-course-2023-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: microservices-course-2023-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - alertmanager
      - node-exporter

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: microservices-course-2023-alertmanager
    env_file:
      - .env
    entrypoint:
      - "/bin/sh"
      - "/etc/alertmanager/entrypoint.sh"
    ports:
      - "9093:9093"
    volumes:
      - ./deployments/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./deployments/alertmanager/entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager_data:/alertmanager

  loki:
    image: grafana/loki:2.9.8
    container_name: microservices-course-2023-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./deployments/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.6.0
    container_name: microservices-course-2023-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    ports:
      - "9080:9080"
    volumes:
      - ./deployments/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp
    depends_on:
      - loki
    
  grafana:
    image: grafana/grafana:12.4.0
    container_name: microservices-course-2023-grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  loki_data:
  promtail_data:
  grafana_data:
