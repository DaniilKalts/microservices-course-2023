# Grafana Tempo trace storage config.
# Receives traces from Jaeger via OTLP and stores them on disk.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# accept traces via OTLP
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 72h # keep traces for 3 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
