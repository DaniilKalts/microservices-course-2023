# Auto-registers data sources on Grafana startup.

apiVersion: 1

# remove data sources not listed here
prune: true

datasources:
  # metrics (dashboards, alerts)
  - name: Prometheus
    uid: prometheus                    # referenced by dashboard JSON
    type: prometheus
    access: proxy                      # Grafana queries server-side
    url: http://prometheus:9090
    isDefault: true                    # default for new panels
    editable: false                    # read-only (config lives in Git)

  # logs
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false

  # traces (Tempo stores traces forwarded from Jaeger)
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
