# Loki stores and indexes logs. Promtail pushes logs here,
# Grafana queries them.

# no authentication (local Docker network)
auth_enabled: false

server:
  # API port (receives logs, serves queries)
  http_listen_port: 3100
  # internal communication port
  grpc_listen_port: 9096

# single-node setup (all components in one process)
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  # no replicas, just one node
  replication_factor: 1
  ring:
    kvstore:
      # in-memory ring (no external store needed)
      store: inmemory

# how logs are indexed and stored
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb                  # recommended index type for Loki 3+
      object_store: filesystem     # store log chunks on local disk
      schema: v13                  # latest schema version
      index:
        prefix: index_
        period: 24h                # create a new index file every day

# where data is written inside the container
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# merges index files and deletes expired logs
compactor:
  working_directory: /loki/compactor
  retention_enabled: true          # delete old logs automatically
  compaction_interval: 10m         # run compaction every 10 min
  delete_request_store: filesystem

# ingestion and retention limits
limits_config:
  allow_structured_metadata: true
  reject_old_samples: true         # refuse logs older than max age
  reject_old_samples_max_age: 168h # 7 days
  max_query_lookback: 0s           # no limit on query time range
  retention_period: 336h           # delete logs older than 14 days

analytics:
  # disable anonymous usage reporting
  reporting_enabled: false
