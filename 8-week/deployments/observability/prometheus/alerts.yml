# Alert rules evaluated by Prometheus every 15s.
# Fired alerts are sent to Alertmanager.

groups:
  - name: termachat-grpc-alerts
    rules:

      - alert: HighGrpcErrorRate

        # fires when:
        #   1. error rate > 1% over last 5 min
        #   2. at least 10 requests in that window (avoids false alarms)
        expr: |
          (
            sum(increase(termachat_grpc_responses_total{status="error"}[5m]))
            /
            sum(increase(termachat_grpc_responses_total[5m]))
          ) > 0.01
          and
          sum(increase(termachat_grpc_responses_total[5m])) > 10

        # wait 2m before firing (ignores short spikes)
        for: 2m

        # metadata for Alertmanager routing
        labels:
          severity: warning
          service: termachat-api

        # shown in the notification
        annotations:
          summary: gRPC error rate is above 1%
          description: gRPC error responses are above 1% over the last 5 minutes.
