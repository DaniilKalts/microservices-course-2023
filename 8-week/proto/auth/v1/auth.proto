syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/DaniilKalts/microservices-course-2023/8-week/gen/grpc/auth/v1;authv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "Auth API"
        version: "1.0.0"
        description: "RESTful gateway API for authentication and tokens."
        contact: {
            name: "Daniil Kalts"
            email: "gopher@gmail.com"
        }
    }
    consumes: "application/json"
    produces: "application/json"
    security_definitions: {
        security: {
            key: "BearerAuth"
            value: {
                type: TYPE_API_KEY
                in: IN_HEADER
                name: "Authorization"
                description: "JWT access token. Example: Bearer <token>"
            }
        }
    }
};

service AuthV1 {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
        name: "🔐 Auth"
        description: "Handles account registration, authentication, and token lifecycle operations."
    };

    rpc Register(RegisterRequest) returns (RegisterResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/register"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Register a new user account"
            description: "Creates a new user account using name, email, and password credentials. Returns the created user profile and a fresh access/refresh token pair."
            tags: "🔐 Auth"
            operation_id: "registerUser"
        };
    };

    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/login"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Authenticate user and return tokens"
            description: "Authenticates a user with email and password credentials. Returns a new access/refresh token pair for authorized API access."
            tags: "🔐 Auth"
            operation_id: "loginUser"
        };
    };

    rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/api/v1/auth/logout"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Invalidate the current session"
            description: "Invalidates the session associated with the provided refresh token. Requires a valid refresh_token and returns an empty response on success."
            tags: "🔐 Auth"
            operation_id: "logoutUser"
        };
    };

    rpc Refresh(RefreshRequest) returns (RefreshResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/refresh"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Rotate access and refresh tokens"
            description: "Issues a new access/refresh token pair by rotating the provided refresh token. Requires a valid refresh_token and returns replacement tokens."
            tags: "🔐 Auth"
            operation_id: "refreshTokens"
        };
    };
}

message TokenPair {
    string access_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
    string refresh_token = 2 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
    int64 access_token_expires_in = 3;
    int64 refresh_token_expires_in = 4;
}

// Register
message RegisterRequest {
    string name = 1 [(validate.rules).string = {
        min_len: 2,
        max_len: 50,
        pattern: "^[^\\x00-\\x1F\\x7F]+$"
    }];
    string email = 2 [(validate.rules).string = {
        email: true,
        max_len: 254
    }];
    string password = 3 [(validate.rules).string = {
        min_len: 8,
        max_len: 64,
        pattern: "^(.*[A-Z].*[a-z].*[0-9].*[^A-Za-z0-9].*|.*[A-Z].*[a-z].*[^A-Za-z0-9].*[0-9].*|.*[A-Z].*[0-9].*[a-z].*[^A-Za-z0-9].*|.*[A-Z].*[0-9].*[^A-Za-z0-9].*[a-z].*|.*[A-Z].*[^A-Za-z0-9].*[a-z].*[0-9].*|.*[A-Z].*[^A-Za-z0-9].*[0-9].*[a-z].*|.*[a-z].*[A-Z].*[0-9].*[^A-Za-z0-9].*|.*[a-z].*[A-Z].*[^A-Za-z0-9].*[0-9].*|.*[a-z].*[0-9].*[A-Z].*[^A-Za-z0-9].*|.*[a-z].*[0-9].*[^A-Za-z0-9].*[A-Z].*|.*[a-z].*[^A-Za-z0-9].*[A-Z].*[0-9].*|.*[a-z].*[^A-Za-z0-9].*[0-9].*[A-Z].*|.*[0-9].*[A-Z].*[a-z].*[^A-Za-z0-9].*|.*[0-9].*[A-Z].*[^A-Za-z0-9].*[a-z].*|.*[0-9].*[a-z].*[A-Z].*[^A-Za-z0-9].*|.*[0-9].*[a-z].*[^A-Za-z0-9].*[A-Z].*|.*[0-9].*[^A-Za-z0-9].*[A-Z].*[a-z].*|.*[0-9].*[^A-Za-z0-9].*[a-z].*[A-Z].*|.*[^A-Za-z0-9].*[A-Z].*[a-z].*[0-9].*|.*[^A-Za-z0-9].*[A-Z].*[0-9].*[a-z].*|.*[^A-Za-z0-9].*[a-z].*[A-Z].*[0-9].*|.*[^A-Za-z0-9].*[a-z].*[0-9].*[A-Z].*|.*[^A-Za-z0-9].*[0-9].*[A-Z].*[a-z].*|.*[^A-Za-z0-9].*[0-9].*[a-z].*[A-Z].*)$"
    }];
}

message RegisterResponse {
    message User {
        string id = 1 [(validate.rules).string.uuid = true];
        string name = 2;
        string email = 3;
    }

    User user = 1 [(validate.rules).message.required = true];
    TokenPair tokens = 2 [(validate.rules).message.required = true];
}

// Login
message LoginRequest {
    string email = 1 [(validate.rules).string = {
        email: true,
        max_len: 254
    }];
    string password = 2 [(validate.rules).string = {
        min_len: 8,
        max_len: 64
    }];
}

message LoginResponse {
    TokenPair tokens = 1 [(validate.rules).message.required = true];
}

// Logout
// The access token should be passed via the Authorization header at the gateway level.
// This RPC revokes the session identified by the provided refresh token.
message LogoutRequest {
    string refresh_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
}

// Refresh
// Token rotation occurs: the provided refresh token is invalidated and a new pair is issued.
message RefreshRequest {
    string refresh_token = 1 [(validate.rules).string = {
        min_len: 1,
        max_len: 4096
    }];
}

// Token rotation occurs: the provided refresh token is invalidated and a new pair is issued.
message RefreshResponse {
    TokenPair tokens = 1 [(validate.rules).message.required = true];
}
