version: "3"
method: none

tasks:
  generate:
    desc: 🚀 Generate Go protobuf/grpc/gateway stubs and split+merged Swagger for all .proto files
    deps:
      - {task: ':install-deps'}
    sources:
      - api/proto/**/*.proto
      - api/third_party/**/*.proto
    generates:
      - api/gen/go/**/*.go
      - api/gen/openapi/**/*.swagger.json
    silent: true
    cmds:
      - echo "🔨 Generating Go code from protos..."
      - mkdir -p "{{.GEN_GRPC_DIR}}"
      - mkdir -p "{{.GEN_OPENAPI_DIR}}"
      - |
        export PATH="$(go env GOPATH)/bin:$PATH"
        PROTO_FILES="$(find "{{.PROTO_DIR}}" -type f -name '*.proto' -print)"

        if [ -z "$PROTO_FILES" ]; then
          echo "⚠️  No .proto files found under '{{.PROTO_DIR}}'"
          exit 1
        fi

        protoc \
          -I "{{.PROTO_DIR}}" \
          -I "api/third_party" \
          --go_out="{{.GEN_GRPC_DIR}}" --go_opt=paths=source_relative \
          --go-grpc_out="{{.GEN_GRPC_DIR}}" --go-grpc_opt=paths=source_relative \
          --grpc-gateway_out="{{.GEN_GRPC_DIR}}" --grpc-gateway_opt=paths=source_relative \
          --openapiv2_out="{{.GEN_OPENAPI_DIR}}" --openapiv2_opt=logtostderr=true \
          --validate_out="lang=go,paths=source_relative:{{.GEN_GRPC_DIR}}" \
          $PROTO_FILES

        protoc \
          -I "{{.PROTO_DIR}}" \
          -I "api/third_party" \
          --openapiv2_out="{{.GEN_OPENAPI_DIR}}" --openapiv2_opt=logtostderr=true,allow_merge=true,merge_file_name=gateway \
          $PROTO_FILES
      - echo "✨ Generation complete!"
